name: Set RapidAPI proxy secret on Render
on:
  workflow_dispatch: {}
jobs:
  setenv:
    runs-on: ubuntu-latest
    steps:
      - name: Update env var and redeploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          NEW_SECRET: ${{ secrets.RAPIDAPI_PROXY_SECRET_REAL }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request, urllib.error

          key = os.environ["RENDER_API_KEY"]
          new = os.environ.get("NEW_SECRET", "")
          assert new, "RAPIDAPI_PROXY_SECRET_REAL secret is not set"
          sid = "srv-d932su0k1i2s73dg75a0"

          def call(method, url, payload=None):
              req = urllib.request.Request(url, method=method)
              req.add_header("Authorization", f"Bearer {key}")
              req.add_header("Content-Type", "application/json")
              data = json.dumps(payload).encode() if payload is not None else None
              try:
                  with urllib.request.urlopen(req, data, timeout=60) as r:
                      return r.status, r.read().decode()
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode()[:400]

          st, body = call("PUT", f"https://api.render.com/v1/services/{sid}/env-vars/RAPIDAPI_PROXY_SECRET",
                          {"value": new})
          print("env update:", st)
          assert st == 200, body
          st2, body2 = call("POST", f"https://api.render.com/v1/services/{sid}/deploys", {})
          print("redeploy:", st2)
          assert st2 == 201, body2
          print("DONE: proxy secret active after deploy (~2 min)")
          PY
