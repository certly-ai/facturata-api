name: keep-warm
on:
  schedule:
    - cron: "7 */4 * * *"
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 235
    steps:
      - name: Keep both Render services warm (self-loop ~3h50m, ping every 10 min)
        run: |
          # Low-frequency schedule (every 4h) is honored reliably; each run then
          # self-pings for ~3h50m so the two free-tier Render services never idle
          # past the ~15-min sleep threshold. Replaces the every-10-min single-ping
          # cron, which GitHub throttled to ~3 runs/day.
          URLS="https://facturata-api.onrender.com/health https://certly-api-h15r.onrender.com/health"
          END=$(( $(date +%s) + 230*60 ))
          n=0
          while [ "$(date +%s)" -le "$END" ]; do
            n=$((n+1))
            for u in $URLS; do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$u" || echo 000)
              echo "$(date -u +%H:%M:%S) round $n  $u  ->  $code"
            done
            sleep 600
          done
          echo "finished after $n rounds"
