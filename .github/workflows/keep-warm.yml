name: Keep warm
on:
  schedule:
    # every 10 minutes, 05:00-19:50 UTC (~15h; leaves Render free-tier hours for certly-api's window)
    - cron: "*/10 5-19 * * *"
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health
        run: |
          code=$(curl -s -o /tmp/h -w "%{http_code}" --max-time 90 https://facturata-api.onrender.com/health || true)
          echo "health: $code $(cat /tmp/h 2>/dev/null | head -c 120)"
          # Also warm the free validator path used by the site
          curl -s -o /dev/null --max-time 90 https://facturata.com/ || true
