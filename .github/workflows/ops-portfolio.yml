name: Portfolio status check
on:
  workflow_dispatch: {}
jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: All services status + health probes
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request, urllib.error

          key = os.environ["RENDER_API_KEY"]

          def call(url, auth=True, timeout=150):
              req = urllib.request.Request(url)
              if auth:
                  req.add_header("Authorization", f"Bearer {key}")
              try:
                  with urllib.request.urlopen(req, timeout=timeout) as r:
                      return r.status, r.read().decode()
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode()[:400]
              except Exception as e:
                  return 0, str(e)

          st, body = call("https://api.render.com/v1/services?limit=20")
          assert st == 200, body
          for item in json.loads(body):
              s = item["service"]
              det = s.get("serviceDetails") or {}
              print("SERVICE:", s["name"], "|", s["id"], "| suspended:", s.get("suspended"),
                    "| url:", det.get("url"))
              st2, deploys = call(f"https://api.render.com/v1/services/{s['id']}/deploys?limit=1")
              if st2 == 200 and json.loads(deploys):
                  d = json.loads(deploys)[0]["deploy"]
                  print("   last deploy:", d.get("status"), "|", (d.get("finishedAt") or d.get("createdAt")))
              if det.get("url"):
                  st3, h = call(det["url"] + "/health", auth=False)
                  print("   health:", st3, h[:150])
          PY
